<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スケジュール表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a73e8;
      --primary-dark: #1557b0;
      --secondary: #34a853;
      --accent: #ea4335;
      --yasui: #9c27b0;
      --arakawa: #009688;
      --holiday-bg: #fff3e0;
      --holiday-text: #e65100;
      --exec-shacho: #d32f2f;
      /* 社長の色 */
      --exec-fuku: #1976d2;
      /* 副社長の色 */
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --text: #202124;
      --text-light: #5f6368;
      --border: #e8eaed;
      --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, #0052cc 100%);
      color: white;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    header .subtitle {
      font-size: 0.75rem;
      opacity: 0.8;
      margin-top: 2px;
    }

    /* ナビゲーション */
    .nav-bar {
      background: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .nav-month {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .btn-nav {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-nav:hover {
      background: var(--primary-dark);
      transform: scale(1.05);
    }

    .month-label {
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 120px;
      text-align: center;
    }

    .btn-today {
      background: white;
      border: 2px solid var(--primary);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-today:hover {
      background: var(--primary);
      color: white;
    }

    /* 凡例 */
    .legend {
      background: white;
      padding: 10px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.78rem;
      border-bottom: 1px solid var(--border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* カレンダービュー */
    #calendar-view {
      padding: 12px;
    }

    /* 月カレンダーグリッド */
    .cal-grid {
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--primary);
      color: white;
    }

    .cal-weekday {
      text-align: center;
      padding: 10px 0;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .cal-weekday.sat {
      color: #90caf9;
    }

    .cal-weekday.sun {
      color: #ef9a9a;
    }

    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
    }

    .cal-day {
      border: 1px solid var(--border);
      min-height: 70px;
      padding: 4px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .cal-day:hover {
      background: #e8f0fe;
    }

    .cal-day.empty {
      background: #fafafa;
      cursor: default;
    }

    .cal-day.today .day-num {
      background: var(--primary);
      color: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cal-day.selected {
      background: #e3f2fd;
    }

    .day-num {
      font-size: 0.82rem;
      font-weight: 600;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-num.sat {
      color: #1565c0;
    }

    .day-num.sun,
    .day-num.hol {
      color: var(--accent);
    }

    .cal-day-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      margin-top: 2px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-common {
      background: var(--secondary);
    }

    .dot-yasui {
      background: var(--yasui);
    }

    .dot-arakawa {
      background: var(--arakawa);
    }

    .dot-holiday {
      background: var(--holiday-text);
    }

    .dot-exec-shacho {
      background: var(--exec-shacho);
    }

    .dot-exec-fuku {
      background: var(--exec-fuku);
    }

    /* 詳細パネル */
    .detail-panel {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .detail-header {
      background: linear-gradient(135deg, #1a73e8, #0052cc);
      color: white;
      padding: 12px 16px;
    }

    .detail-header .date-big {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .detail-header .weekday-big {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    .detail-body {
      padding: 0;
    }

    .detail-row {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      gap: 12px;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-size: 0.78rem;
      font-weight: 700;
      min-width: 80px;
      padding: 2px 8px;
      border-radius: 12px;
      height: fit-content;
      text-align: center;
    }

    .label-common {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .label-yasui {
      background: #f3e5f5;
      color: #6a1b9a;
    }

    .label-arakawa {
      background: #e0f2f1;
      color: #00796b;
    }

    .label-holiday {
      background: #fff3e0;
      color: #e65100;
    }

    .label-exec-shacho {
      background: #ffebee;
      color: #c62828;
    }

    .label-exec-fuku {
      background: #e3f2fd;
      color: #1565c0;
    }

    .detail-text {
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre-wrap;
      flex: 1;
    }

    .holiday-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .holiday-chip {
      background: var(--holiday-bg);
      color: var(--holiday-text);
      border: 1px solid #ffcc80;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .no-data {
      color: var(--text-light);
      font-size: 0.85rem;
      padding: 16px;
      text-align: center;
    }

    /* リストビュー */
    #list-view {
      padding: 12px;
      display: none;
    }

    .list-month-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      padding: 8px 4px;
      border-bottom: 2px solid var(--primary);
      margin-bottom: 8px;
    }

    .list-item {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .list-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    .list-item-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #f8f9fa;
      border-bottom: 1px solid var(--border);
    }

    .list-date-badge {
      background: var(--primary);
      color: white;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .list-date-badge.sat {
      background: #1565c0;
    }

    .list-date-badge.sun {
      background: var(--accent);
    }

    .list-item-body {
      padding: 10px 14px;
    }

    .list-section {
      margin-bottom: 8px;
    }

    .list-section:last-child {
      margin-bottom: 0;
    }

    .list-section-label {
      font-size: 0.73rem;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .list-section-text {
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .list-holiday-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }

    /* タブ切り替え */
    .tab-bar {
      display: flex;
      background: white;
      border-bottom: 2px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
      margin-bottom: -2px;
    }

    /* ローディング */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--text-light);
      gap: 12px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* 更新ボタン */
    .update-info {
      text-align: center;
      color: var(--text-light);
      font-size: 0.75rem;
      padding: 8px;
    }

    @media (min-width: 768px) {
      .cal-day {
        min-height: 90px;
      }

      #list-view {
        max-width: 800px;
        margin: 0 auto;
      }

      #calendar-view {
        max-width: 900px;
        margin: 0 auto;
      }

      header h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>📅 スケジュール表</h1>
    <div class="subtitle" id="updated-at">読み込み中...</div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-cal" onclick="switchTab('cal')">
      🗓 カレンダー
    </button>
    <button class="tab-btn" id="tab-list" onclick="switchTab('list')">
      📋 リスト表示
    </button>
  </div>

  <div class="nav-bar">
    <div class="nav-month">
      <button class="btn-nav" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="month-label">読み込み中</div>
      <button class="btn-nav" onclick="changeMonth(1)">›</button>
    </div>
    <button class="btn-today" onclick="goToday()">今日</button>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot dot-common"></span>共通予定</span>
    <span class="legend-item"><span class="legend-dot dot-yasui"></span>安井さん</span>
    <span class="legend-item"><span class="legend-dot dot-arakawa"></span>荒川さん</span>
    <span class="legend-item"><span class="legend-dot dot-exec-shacho"></span>社長</span>
    <span class="legend-item"><span class="legend-dot dot-exec-fuku"></span>副社長</span>
    <span class="legend-item"><span class="legend-dot dot-holiday" style="background:#e65100"></span>休み(荒/小/島/井)</span>
  </div>

  <!-- カレンダービュー -->
  <div id="calendar-view">
    <div class="loading">
      <div class="spinner"></div>データを読み込み中...
    </div>
  </div>

  <!-- リストビュー -->
  <div id="list-view">
    <div class="loading">
      <div class="spinner"></div>データを読み込み中...
    </div>
  </div>

  <script>
    let ALL_DATA = [];
    let currentYear, currentMonth;
    let selectedDate = null;
    let currentTab = 'cal';

    // 今日
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    async function loadData() {
      try {
        const res = await fetch('schedule_data.json');
        const json = await res.json();
        ALL_DATA = json.schedules;
        document.getElementById('updated-at').textContent = '最終更新: ' + json.generated;
        init();
      } catch (e) {
        document.getElementById('calendar-view').innerHTML =
          '<div class="no-data">⚠️ データ読み込みエラー。schedule_data.jsonが同じフォルダにあるか確認してください。</div>';
      }
    }

    function init() {
      currentYear = today.getFullYear();
      currentMonth = today.getMonth() + 1;
      selectedDate = formatDate(today);
      render();
    }

    function formatDate(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function getByDate(dateStr) {
      return ALL_DATA.find(d => d.date === dateStr) || null;
    }

    function getMonthData(year, month) {
      const prefix = year + '-' + String(month).padStart(2, '0');
      return ALL_DATA.filter(d => d.date.startsWith(prefix));
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-cal').classList.toggle('active', tab === 'cal');
      document.getElementById('tab-list').classList.toggle('active', tab === 'list');
      document.getElementById('calendar-view').style.display = tab === 'cal' ? '' : 'none';
      document.getElementById('list-view').style.display = tab === 'list' ? '' : 'none';
      render();
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth > 12) { currentMonth = 1; currentYear++; }
      if (currentMonth < 1) { currentMonth = 12; currentYear--; }
      render();
    }

    function goToday() {
      currentYear = today.getFullYear();
      currentMonth = today.getMonth() + 1;
      selectedDate = formatDate(today);
      render();
    }

    function render() {
      document.getElementById('month-label').textContent =
        currentYear + '年' + currentMonth + '月';

      if (currentTab === 'cal') renderCalendar();
      else renderList();
    }

    function renderCalendar() {
      const cv = document.getElementById('calendar-view');
      const monthData = getMonthData(currentYear, currentMonth);

      // カレンダーグリッド
      const firstDay = new Date(currentYear, currentMonth - 1, 1);
      const lastDay = new Date(currentYear, currentMonth, 0);
      let startDow = firstDay.getDay(); // 0=日

      let html = '<div class="cal-grid">';
      html += '<div class="cal-weekdays">';
      ['日', '月', '火', '水', '木', '金', '土'].forEach((d, i) => {
        const cls = i === 0 ? 'sun' : i === 6 ? 'sat' : '';
        html += `<div class="cal-weekday ${cls}">${d}</div>`;
      });
      html += '</div><div class="cal-days">';

      // 空白
      for (let i = 0; i < startDow; i++) {
        html += '<div class="cal-day empty"></div>';
      }

      for (let d = 1; d <= lastDay.getDate(); d++) {
        const dateStr = currentYear + '-' + String(currentMonth).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        const dow = (startDow + d - 1) % 7;
        const isToday = dateStr === formatDate(today);
        const isSel = dateStr === selectedDate;
        const entry = getByDate(dateStr);

        let cls = 'cal-day';
        if (isToday) cls += ' today';
        if (isSel) cls += ' selected';

        let numCls = 'day-num';
        if (dow === 0) numCls += ' sun';
        else if (dow === 6) numCls += ' sat';

        let dots = '';
        if (entry) {
          if (entry.common) dots += '<span class="dot dot-common"></span>';
          if (entry.yasui) dots += '<span class="dot dot-yasui"></span>';
          if (entry.arakawa) dots += '<span class="dot dot-arakawa"></span>';
          if (entry.executives && entry.executives.some(e => e.role.includes('社長') && e.role !== '副社長'))
            dots += '<span class="dot dot-exec-shacho"></span>';
          if (entry.executives && entry.executives.some(e => e.role.includes('副社長')))
            dots += '<span class="dot dot-exec-fuku"></span>';
          if (entry.holidays && entry.holidays.length > 0)
            dots += '<span class="dot dot-holiday" style="background:#e65100"></span>';
        }

        html += `<div class="${cls}" onclick="selectDate('${dateStr}')">
      <div class="${numCls}">${d}</div>
      <div class="cal-day-dots">${dots}</div>
    </div>`;
      }

      html += '</div></div>';

      // 詳細パネル
      html += renderDetail(selectedDate);

      html += '<div class="update-info">データは「更新.bat」を実行すると最新化されます</div>';

      cv.innerHTML = html;
    }

    function renderDetail(dateStr) {
      if (!dateStr) return '';
      const d = getByDate(dateStr);
      const dateObj = new Date(dateStr);
      const wdays = ['日', '月', '火', '水', '木', '金', '土'];
      const wd = wdays[dateObj.getDay()];
      const month = dateObj.getMonth() + 1;
      const day = dateObj.getDate();

      let html = `<div class="detail-panel">
    <div class="detail-header">
      <div class="date-big">${month}月${day}日 (${wd})</div>
    </div>
    <div class="detail-body">`;

      if (!d) {
        html += '<div class="no-data">この日のデータはありません</div>';
      } else {
        // 共通予定
        html += `<div class="detail-row">
      <span class="detail-label label-common">📌 共通予定</span>
      <div class="detail-text">${d.common ? escapeHtml(d.common) : '<span style="color:#aaa">なし</span>'}</div>
    </div>`;

        // 安井さん
        html += `<div class="detail-row">
      <span class="detail-label label-yasui">👤 安井さん</span>
      <div class="detail-text">${d.yasui ? escapeHtml(d.yasui) : '<span style="color:#aaa">なし</span>'}</div>
    </div>`;

        // 荒川さん
        html += `<div class="detail-row">
      <span class="detail-label label-arakawa">👤 荒川さん</span>
      <div class="detail-text">${d.arakawa ? escapeHtml(d.arakawa) : '<span style="color:#aaa">なし</span>'}</div>
    </div>`;

        // 役員予定
        if (d.executives && d.executives.length > 0) {
          const shacho = d.executives.filter(e => e.role.includes('社長') && e.role !== '副社長');
          const fuku = d.executives.filter(e => e.role.includes('副社長'));

          if (shacho.length > 0) {
            html += `<div class="detail-row">
          <span class="detail-label label-exec-shacho">👔 ${escapeHtml(shacho[0].role)}</span>
          <div class="detail-text">${shacho.map(e => escapeHtml(e.text)).join('<br>')}</div>
        </div>`;
          }
          if (fuku.length > 0) {
            html += `<div class="detail-row">
          <span class="detail-label label-exec-fuku">👔 ${escapeHtml(fuku[0].role)}</span>
          <div class="detail-text">${fuku.map(e => escapeHtml(e.text)).join('<br>')}</div>
        </div>`;
          }
        }

        // 休み
        const hols = d.holidays || [];
        html += `<div class="detail-row">
      <span class="detail-label label-holiday">🏖 休み</span>
      <div>`;
        if (hols.length === 0) {
          html += '<span style="color:#aaa;font-size:0.85rem">なし</span>';
        } else {
          html += '<div class="holiday-chips">';
          hols.forEach(name => {
            html += `<span class="holiday-chip">${name}</span>`;
          });
          html += '</div>';
        }
        html += '</div></div>';
      }

      html += '</div></div>';
      return html;
    }

    function selectDate(dateStr) {
      selectedDate = dateStr;
      renderCalendar();
    }

    function renderList() {
      const lv = document.getElementById('list-view');

      // 現在月のデータ表示
      const monthData = getMonthData(currentYear, currentMonth);

      if (monthData.length === 0) {
        lv.innerHTML = '<div class="no-data">この月のデータはありません</div>';
        return;
      }

      const wdays = ['日', '月', '火', '水', '木', '金', '土'];
      let html = `<div class="list-month-title">${currentYear}年${currentMonth}月</div>`;

      monthData.forEach(entry => {
        const dateObj = new Date(entry.date);
        const dow = dateObj.getDay();
        const wd = wdays[dow];
        const isToday = entry.date === formatDate(today);
        const day = dateObj.getDate();

        let badgeCls = 'list-date-badge';
        if (dow === 0) badgeCls += ' sun';
        else if (dow === 6) badgeCls += ' sat';

        const hasContent = entry.common || entry.yasui || entry.arakawa || (entry.holidays && entry.holidays.length > 0) || (entry.executives && entry.executives.length > 0);
        if (!hasContent) return;

        html += `<div class="list-item" onclick="selectAndShowCal('${entry.date}')">
      <div class="list-item-header">
        <span class="${badgeCls}">${currentMonth}/${day} (${wd})${isToday ? ' 📍今日' : ''}</span>
      </div>
      <div class="list-item-body">`;

        if (entry.common) {
          html += `<div class="list-section">
        <div class="list-section-label">📌 共通予定</div>
        <div class="list-section-text" style="color:#2e7d32">${escapeHtml(entry.common)}</div>
      </div>`;
        }
        if (entry.yasui) {
          html += `<div class="list-section">
        <div class="list-section-label">👤 安井さん</div>
        <div class="list-section-text" style="color:#6a1b9a">${escapeHtml(entry.yasui)}</div>
      </div>`;
        }
        if (entry.arakawa) {
          html += `<div class="list-section">
        <div class="list-section-label">👤 荒川さん</div>
        <div class="list-section-text" style="color:#00796b">${escapeHtml(entry.arakawa)}</div>
      </div>`;
        }
        if (entry.executives && entry.executives.length > 0) {
          const shacho = entry.executives.filter(e => e.role.includes('社長') && e.role !== '副社長');
          const fuku = entry.executives.filter(e => e.role.includes('副社長'));

          if (shacho.length > 0) {
            html += `<div class="list-section">
          <div class="list-section-label" style="color:#c62828">👔 ${escapeHtml(shacho[0].role)}</div>
          <div class="list-section-text">${shacho.map(e => escapeHtml(e.text)).join('<br>')}</div>
        </div>`;
          }
          if (fuku.length > 0) {
            html += `<div class="list-section">
          <div class="list-section-label" style="color:#1565c0">👔 ${escapeHtml(fuku[0].role)}</div>
          <div class="list-section-text">${fuku.map(e => escapeHtml(e.text)).join('<br>')}</div>
        </div>`;
          }
        }
        if (entry.holidays && entry.holidays.length > 0) {
          html += `<div class="list-section">
        <div class="list-section-label">🏖 休み</div>
        <div class="list-holiday-chips">`;
          entry.holidays.forEach(name => {
            html += `<span class="holiday-chip">${name}</span>`;
          });
          html += '</div></div>';
        }

        html += '</div></div>';
      });

      lv.innerHTML = html || '<div class="no-data">予定のある日はありません</div>';
    }

    function selectAndShowCal(dateStr) {
      selectedDate = dateStr;
      switchTab('cal');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/\n/g, '<br>');
    }

    loadData();
  </script>
</body>

</html>
